version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: smart_leads_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart_leads_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_leads_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smart_leads_db
      - JWT_SECRET=supersecret123_leads_crm_production_key
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - smart_leads_network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_leads_frontend
    ports:
      - "3000:80"
    networks:
      - smart_leads_network
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:

networks:
  smart_leads_network:
    driver: bridge
